<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RePlate Awareness</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
overflow:hidden;
}

/* Fullscreen container */

.container{
position:relative;
width:100%;
height:100vh;
}

/* Background Image */

.bg-image{
position:absolute;
width:100%;
height:100%;
background:url("intro.png") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

/* Quote Box */
/* 
.quote-box{
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:10px;
max-width:700px;
}

.quote-box h1{
font-size:38px;
line-height:1.4;
} */

.enter-btn{
margin-top:450px;
padding:14px 35px;
font-size:18px;
background:black;
border:2px dashed white;
border-radius:30px;
color:white;
cursor:pointer;
display:none;
}

.enter-btn:hover{
background:#4CAF50;
}

/* Scratch layer */

canvas{
position:absolute;
top:0;
left:0;
}

</style>
</head>

<body>

<div class="container">

<div class="bg-image">

<div class="quote-box">



<button class="enter-btn" onclick="enterSite()">Enter RePlate</button>

</div>

</div>

<canvas id="scratchCanvas"></canvas>

</div>

<script>

/* Canvas setup */

const canvas=document.getElementById("scratchCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* Grey scratch layer */

ctx.fillStyle="gray";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.textAlign="center";
ctx.fillText("Scratch the screen to reveal the truth",canvas.width/2,canvas.height/2);

/* Scratch effect */

let drawing=false;

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mousemove",scratch);

function scratch(e){

if(!drawing) return;

const rect=canvas.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

ctx.globalCompositeOperation="destination-out";

ctx.beginPath();
ctx.arc(x,y,35,0,Math.PI*2);
ctx.fill();

checkScratch();

}

/* Check how much scratched */

function checkScratch(){

const pixels=ctx.getImageData(0,0,canvas.width,canvas.height);

let transparent=0;

for(let i=3;i<pixels.data.length;i+=4){

if(pixels.data[i]===0) transparent++;

}

let percent=(transparent/(pixels.data.length/4))*100;

if(percent>35){

canvas.style.display="none";

document.querySelector(".enter-btn").style.display="inline-block";

}

}

/* Enter main website */

function enterSite(){
window.location.href="index.html";
}

</script>

</body>
</html>
