<!DOCTYPE html>
<html>
<head>

<title>Profile - RePlate</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
padding:0;
background:#f4f4f4;
}

/* Navbar */

nav{
width:100%;
padding:20px;
background:#4CAF50;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:0 25px;
font-size:18px;
font-weight:bold;
}

/* Heading */

h1{
text-align:center;
color:#4CAF50;
margin-top:30px;
}

#total{
text-align:center;
font-size:20px;
margin:15px;
font-weight:bold;
}

/* Donation Cards */

.donation-card{
background:white;
padding:20px;
margin:15px auto;
max-width:600px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

/* Delete Button */

.delete-btn{
background:red;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.delete-btn:hover{
background:darkred;
}

/* Footer */

footer{
background:#333;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<nav>
<a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
<a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a>
<a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>
<a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
</nav>

<h1>❤️ You Have Donated</h1>

<p id="total"></p>

<div id="donationList"></div>

<script>

let donations = JSON.parse(localStorage.getItem("donations")) || [];

let listContainer = document.getElementById("donationList");
let total = document.getElementById("total");

/* Show Total Donations */

total.textContent = "Total Donations: " + donations.length;

/* If no donations */

if(donations.length === 0){

listContainer.innerHTML = "<p style='text-align:center;'>No donations yet.</p>";

}

/* Display Donations */

else{

donations.forEach(function(d,index){

listContainer.innerHTML += `

<div class="donation-card">

<p><strong>Name:</strong> ${d.Name}</p>

<p><strong>Phone:</strong> ${d.Phone}</p>

<p><strong>Food:</strong> ${d.Food}</p>

<p><strong>Quantity:</strong> ${d.Quantity}</p>

<button class="delete-btn" onclick="deleteDonation(${index})">Delete</button>

</div>

`;

});

}

/* Delete Donation */

function deleteDonation(index){

donations.splice(index,1);

localStorage.setItem("donations",JSON.stringify(donations));

location.reload();

}

</script>

<footer>
© 2026 RePlate | Zero Waste Food Donation Initiative
</footer>

</body>
</html>
